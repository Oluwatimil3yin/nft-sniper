services:
  - type: web
    name: nft-rarity-sniper-web
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    autoDeploy: true

  - type: worker
    name: nft-rarity-watcher
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python watcher.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: CONTRACT
        sync: false
      - key: ALCHEMY_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: WATCHER_MODE
        value: reveal
      - key: SUPPLY
        value: "10000"
      - key: THRESHOLD
        value: "180"
      - key: BLAST
        value: "true"
    autoDeploy: true
